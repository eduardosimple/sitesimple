<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — SIMPLE Performance Digital</title>
  <meta name="description" content="Insights, estratégias e cases sobre marketing digital, performance e crescimento para empresas brasileiras." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://mktsimple.com.br/blog" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mktsimple.com.br/blog" />
  <meta property="og:title" content="Blog — SIMPLE Performance Digital" />
  <meta property="og:description" content="Insights, estratégias e cases sobre marketing digital e performance." />
  <meta property="og:image" content="https://mktsimple.com.br/og-image.jpg" />
  <meta property="og:locale" content="pt_BR" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --bg2: #161616;
      --border: #262626;
      --text: #e5e5e5;
      --muted: #737373;
      --accent: #22c55e;
      --accent-dim: #16a34a;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }

    /* NAV */
    nav {
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      background: rgba(13,13,13,0.95);
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    .logo { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.02em; }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; font-size: 0.9rem; color: var(--muted); }
    .nav-links a:hover { color: var(--text); }

    /* HERO */
    .hero {
      max-width: 760px;
      margin: 0 auto;
      padding: 5rem 1.5rem 3rem;
    }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      margin-bottom: 1.25rem;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 1rem;
    }
    .hero p {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 540px;
    }

    /* POSTS GRID */
    .posts-section {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 1.5rem 5rem;
    }

    .posts-grid {
      display: flex;
      flex-direction: column;
      gap: 1.5px;
    }

    .post-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: start;
      padding: 1.75rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
    }
    .post-card:first-child { border-top: 1px solid var(--border); }
    .post-card:hover .post-title { color: var(--accent); }
    .post-card:hover .post-arrow { color: var(--accent); transform: translate(3px, -3px); }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .post-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border); }
    .post-title {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
      transition: color 0.15s;
    }
    .post-excerpt {
      font-size: 0.9rem;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-arrow {
      font-size: 1.2rem;
      color: var(--border);
      transition: all 0.15s;
      padding-top: 0.25rem;
    }

    /* STATES */
    .loading, .empty {
      text-align: center;
      color: var(--muted);
      padding: 4rem 0;
      font-size: 0.95rem;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }
    footer a { color: var(--accent); }

    @media (max-width: 600px) {
      .nav-links { display: none; }
      .post-card { grid-template-columns: 1fr; }
      .post-arrow { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">SIMPLE<span>.</span></a>
  <div class="nav-links">
    <a href="/">Início</a>
    <a href="/blog" style="color: var(--text);">Blog</a>
    <a href="/#contato">Contato</a>
  </div>
</nav>

<section class="hero">
  <span class="badge">Blog</span>
  <h1>Insights de<br>Performance Digital</h1>
  <p>Estratégias, cases e aprendizados sobre marketing digital, tráfego pago e crescimento de negócios.</p>
</section>

<section class="posts-section">
  <div class="posts-grid" id="posts">
    <div class="loading">
      <div class="spinner"></div>
      Carregando artigos...
    </div>
  </div>
</section>

<footer>
  <p>© 2026 SIMPLE Performance Digital · <a href="mailto:eduardo@mktsimple.com.br">eduardo@mktsimple.com.br</a></p>
</footer>

<script>
  const SUPABASE_URL = 'https://eojieekveynyilhxnsyn.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvamllZWt2ZXlueWlsaHhuc3luIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTg0NDYsImV4cCI6MjA4OTQ5NDQ0Nn0.blVsJ2HZZKEEJ5mFHqq7iEumxc5vzhM5_FIICJPLRYA';

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
  }

  function readTime(content) {
    const words = (content || '').split(/\s+/).length;
    return Math.max(1, Math.round(words / 200)) + ' min';
  }

  async function loadPosts() {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/blog_posts?published=eq.true&order=published_at.desc&select=title,slug,excerpt,published_at,content`,
        { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      const posts = await res.json();
      const container = document.getElementById('posts');

      if (!posts.length) {
        container.innerHTML = '<div class="empty">Nenhum artigo publicado ainda. Volte em breve!</div>';
        return;
      }

      container.innerHTML = posts.map(p => `
        <article class="post-card" onclick="location.href='/blog/${p.slug}'">
          <div>
            <div class="post-meta">
              <span>${formatDate(p.published_at)}</span>
              <span class="dot"></span>
              <span>${readTime(p.content)} de leitura</span>
            </div>
            <h2 class="post-title">${p.title}</h2>
            <p class="post-excerpt">${p.excerpt || ''}</p>
          </div>
          <span class="post-arrow">↗</span>
        </article>
      `).join('');
    } catch (e) {
      document.getElementById('posts').innerHTML = '<div class="empty">Erro ao carregar artigos.</div>';
    }
  }

  loadPosts();
</script>
</body>
</html>
