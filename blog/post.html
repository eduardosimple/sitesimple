<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Meta tags preenchidas dinamicamente pelo JS -->
  <title>Blog — SIMPLE Performance Digital</title>
  <meta name="robots" content="index, follow" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --bg2: #161616;
      --border: #262626;
      --text: #e5e5e5;
      --muted: #737373;
      --accent: #22c55e;
      --accent-dim: #16a34a;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }

    /* NAV */
    nav {
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      background: rgba(13,13,13,0.95);
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    .logo { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.02em; }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; font-size: 0.9rem; color: var(--muted); }
    .nav-links a:hover { color: var(--text); }

    /* BREADCRUMB */
    .breadcrumb {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem 0;
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      gap: 0.4rem;
      align-items: center;
    }
    .breadcrumb a:hover { color: var(--text); }
    .breadcrumb .sep { color: var(--border); }

    /* ARTICLE */
    .article-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }

    .article-header { margin-bottom: 2.5rem; }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .article-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border); }

    .article-title {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    .article-excerpt {
      font-size: 1.1rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .article-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    /* COVER IMAGE */
    .cover-image {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 2.5rem;
      border: 1px solid var(--border);
    }

    /* PROSE */
    .prose { font-size: 1.05rem; line-height: 1.8; }
    .prose h1, .prose h2, .prose h3, .prose h4 {
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 2.5rem 0 0.75rem;
      line-height: 1.3;
    }
    .prose h2 { font-size: 1.5rem; }
    .prose h3 { font-size: 1.2rem; }
    .prose h4 { font-size: 1rem; color: var(--muted); }
    .prose p { margin-bottom: 1.25rem; }
    .prose a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
    .prose a:hover { color: var(--accent-dim); }
    .prose strong { color: #fff; font-weight: 600; }
    .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 1.25rem; }
    .prose li { margin-bottom: 0.4rem; }
    .prose blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1.25rem;
      background: var(--bg2);
      border-radius: 0 6px 6px 0;
      margin: 1.5rem 0;
      color: var(--text);
      font-style: italic;
    }
    .prose code {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.15em 0.4em;
      font-size: 0.88em;
      font-family: 'Menlo', 'Monaco', monospace;
      color: var(--accent);
    }
    .prose pre {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      overflow-x: auto;
      margin-bottom: 1.25rem;
    }
    .prose pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text);
      font-size: 0.9rem;
    }
    .prose img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin: 1.5rem 0;
    }
    .prose hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }
    .prose table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.25rem;
      font-size: 0.92rem;
    }
    .prose th {
      background: var(--bg2);
      padding: 0.6rem 0.9rem;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid var(--border);
    }
    .prose td {
      padding: 0.6rem 0.9rem;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
    }
    .prose tr:last-child td { border-bottom: none; }

    /* CTA SECTION */
    .cta-box {
      margin-top: 3.5rem;
      padding: 2rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-align: center;
    }
    .cta-box h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .cta-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.25rem; }
    .cta-btn {
      display: inline-block;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.7rem 1.5rem;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .cta-btn:hover { background: var(--accent-dim); }

    /* STATES */
    .loading, .not-found {
      text-align: center;
      color: var(--muted);
      padding: 5rem 0;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }
    footer a { color: var(--accent); }

    @media (max-width: 600px) {
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">SIMPLE<span>.</span></a>
  <div class="nav-links">
    <a href="/">Início</a>
    <a href="/blog" style="color: var(--text);">Blog</a>
    <a href="/#contato">Contato</a>
  </div>
</nav>

<div class="breadcrumb">
  <a href="/">Início</a>
  <span class="sep">/</span>
  <a href="/blog">Blog</a>
  <span class="sep">/</span>
  <span id="breadcrumb-title">Artigo</span>
</div>

<main class="article-wrap" id="main">
  <div class="loading">
    <div class="spinner"></div>
    Carregando artigo...
  </div>
</main>

<footer>
  <p>© 2026 SIMPLE Performance Digital · <a href="mailto:eduardo@mktsimple.com.br">eduardo@mktsimple.com.br</a></p>
</footer>

<script>
  const SUPABASE_URL = 'https://eojieekveynyilhxnsyn.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvamllZWt2ZXlueWlsaHhuc3luIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTg0NDYsImV4cCI6MjA4OTQ5NDQ0Nn0.blVsJ2HZZKEEJ5mFHqq7iEumxc5vzhM5_FIICJPLRYA';

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
  }

  function readTime(content) {
    const words = (content || '').split(/\s+/).length;
    return Math.max(1, Math.round(words / 200)) + ' min de leitura';
  }

  function setMeta(post) {
    const title = `${post.seo_title || post.title} — SIMPLE Performance Digital`;
    const desc = post.seo_description || post.excerpt || '';
    const url = `https://mktsimple.com.br/blog/${post.slug}`;

    document.title = title;
    document.getElementById('breadcrumb-title').textContent = post.title;

    const setTag = (sel, attr, val) => {
      let el = document.querySelector(sel);
      if (!el) { el = document.createElement('meta'); document.head.appendChild(el); }
      el.setAttribute(attr, val);
    };

    setTag('meta[name="description"]', 'content', desc);
    setTag('link[rel="canonical"]', 'href', url) || (() => {
      const l = document.createElement('link');
      l.rel = 'canonical'; l.href = url;
      document.head.appendChild(l);
    })();

    // Open Graph
    [
      ['meta[property="og:title"]', 'content', title],
      ['meta[property="og:description"]', 'content', desc],
      ['meta[property="og:url"]', 'content', url],
      ['meta[property="og:type"]', 'content', 'article'],
    ].forEach(([sel, attr, val]) => {
      let el = document.querySelector(sel);
      if (!el) { el = document.createElement('meta'); document.head.appendChild(el); }
      el.setAttribute('property', sel.match(/og:\w+/)[0]);
      el.setAttribute(attr, val);
    });

    if (post.cover_image) {
      let el = document.querySelector('meta[property="og:image"]');
      if (!el) { el = document.createElement('meta'); document.head.appendChild(el); }
      el.setAttribute('property', 'og:image');
      el.setAttribute('content', post.cover_image);
    }

    // Schema.org Article
    const schema = {
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": post.title,
      "description": desc,
      "datePublished": post.published_at,
      "author": { "@type": "Person", "name": post.author || "SIMPLE Performance Digital" },
      "publisher": {
        "@type": "Organization",
        "name": "SIMPLE Performance Digital",
        "url": "https://mktsimple.com.br"
      },
      "url": url
    };
    if (post.cover_image) schema.image = post.cover_image;

    const existing = document.querySelector('script[type="application/ld+json"]');
    if (existing) existing.remove();
    const s = document.createElement('script');
    s.type = 'application/ld+json';
    s.textContent = JSON.stringify(schema);
    document.head.appendChild(s);
  }

  async function loadPost() {
    const slug = window.location.pathname.replace('/blog/', '').replace(/\/$/, '');

    if (!slug || slug === 'blog') {
      window.location.href = '/blog';
      return;
    }

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/blog_posts?slug=eq.${slug}&published=eq.true&limit=1`,
        { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      const data = await res.json();

      if (!data.length) {
        document.getElementById('main').innerHTML = `
          <div class="not-found">
            <p style="font-size:3rem;margin-bottom:1rem;">404</p>
            <p>Artigo não encontrado.</p>
            <a href="/blog" style="color:var(--accent);display:inline-block;margin-top:1rem;">← Voltar ao blog</a>
          </div>`;
        return;
      }

      const post = data[0];
      setMeta(post);

      const htmlContent = marked.parse(post.content || '');

      document.getElementById('main').innerHTML = `
        <article>
          <header class="article-header">
            <div class="article-meta">
              <span>${post.author || 'SIMPLE Performance Digital'}</span>
              <span class="dot"></span>
              <span>${formatDate(post.published_at)}</span>
              <span class="dot"></span>
              <span>${readTime(post.content)}</span>
            </div>
            <h1 class="article-title">${post.title}</h1>
            ${post.excerpt ? `<p class="article-excerpt">${post.excerpt}</p>` : ''}
          </header>
          <hr class="article-divider" />
          ${post.cover_image ? `<img class="cover-image" src="${post.cover_image}" alt="${post.title}" />` : ''}
          <div class="prose">${htmlContent}</div>
          <div class="cta-box">
            <h3>Quer crescer com performance digital?</h3>
            <p>Agende uma análise estratégica gratuita e descubra o potencial do seu negócio.</p>
            <a href="/#contato" class="cta-btn">Quero uma análise gratuita →</a>
          </div>
        </article>`;
    } catch (e) {
      document.getElementById('main').innerHTML = '<div class="not-found">Erro ao carregar artigo.</div>';
    }
  }

  loadPost();
</script>
</body>
</html>
